server {
    listen 80;
    server_name chouiaartravel.com www.chouiaartravel.com;

    # إعادة التوجيه لـ HTTPS (بعد تثبيت SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chouiaartravel.com www.chouiaartravel.com;

    # شهادة SSL — سيتم إنشاؤها تلقائياً عبر Certbot
    ssl_certificate /etc/letsencrypt/live/chouiaartravel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chouiaartravel.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # حجم الرفع (للملفات المرفقة)
    client_max_body_size 50M;

    # API — يذهب للخادم الخلفي
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # الواجهة الأمامية — الملفات الثابتة
    location / {
        root /var/www/chouiaar/frontend;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
